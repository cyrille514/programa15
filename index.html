<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta obligatoria para activar el Diseño Responsivo y el giro automático en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Emails Estricto</title>
    <!-- Importación oficial de Tailwind CSS v4 -->
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <style type="text/tailwindcss">
      @import "tailwindcss";
      @layer base {
         :root {
          @apply text-lg;
           line-height: 1.6;
         }
      }
    </style>
</head>

<body class="bg-[#FFF0E4] w-full min-h-screen flex items-center justify-center p-2 sm:p-6 md:p-12 select-none font-sans text-gray-900 antialiased">

    <main class="bg-white p-5 sm:p-10 md:p-14 w-full max-w-xl min-h-[460px] sm:min-h-[500px] flex flex-col justify-between border-2 border-slate-200 rounded-3xl shadow-2xl text-center transition-all duration-300">
        
        <div class="w-full">
            <header class="text-center mb-6 sm:mb-8">
                <!-- Título responsivo: más compacto en móvil para evitar saltos artificiales -->
                <h1 class="text-2xl sm:text-3xl font-black text-amber-500 tracking-tight uppercase">Validador de Emails</h1>
                <p class="text-base sm:text-xl font-bold text-slate-800 mt-2">Comprobación texto que sea un email válido</p>
            </header>

            <!-- Formulario Puro controlado por los escuchadores nativos de JavaScript -->
            <form id="validador-form" class="space-y-6 sm:space-y-8 w-full" novalidate>
                <div class="text-left w-full">
                    <label for="input-email" class="block text-base sm:text-lg font-bold text-center text-slate-800 mb-3 tracking-wide">
                        Introduce tu correo electrónico:
                    </label>
                    <!-- Input elástico con propiedad 'break-all' para correos extremadamente largos -->
                    <input 
                        type="text" 
                        id="input-email" 
                        placeholder="Ej. pato_lucas@outlook.es" 
                        required
                        autocomplete="off"
                        class="w-full px-4 sm:px-6 py-3 sm:py-4 border-2 border-green-300 rounded-2xl text-slate-800 font-normal text-lg sm:text-2xl focus:ring-4 focus:ring-blue-400 focus:border-blue-500 outline-none transition-all bg-slate-50 shadow-inner break-all"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3.5 sm:py-5 px-6 sm:px-8 rounded-2xl transition-all duration-200 cursor-pointer shadow-md active:scale-98 text-center text-lg sm:text-xl tracking-widest uppercase"
                >
                    Verificar Email
                </button>
            </form>
        </div>

        <!-- Bloque de Resultados Adaptable con control de desborde -->
        <section id="resultado-validacion" class="mt-6 sm:mt-8 p-4 sm:p-5 rounded-2xl border-4 hidden transition-all duration-300 shadow-xl max-w-full overflow-hidden">
            <p id="texto-validacion" class="text-base sm:text-2xl font-black text-center tracking-wide break-all"></p>
        </section>

    </main>

    <!-- Única vinculación JavaScript al final del cuerpo -->
    <script src="./js/app.js"></script>
</body>
</html>
